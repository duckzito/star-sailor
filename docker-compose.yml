services:
  star-sailor:
    build: .
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=2567
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2567/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      star-sailor:
        condition: service_healthy
